<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sistem Prediksi Hasil Tanam (Logika Fuzzy)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

    <h1>Prediksi Hasil Tanam 🌾</h1>
    <p>Masukkan parameter tanah untuk memprediksi potensi hasil tanam.</p>

    <!-- ================= INPUT MANUAL ================= -->
    <form id="fuzzy-form">
        <div class="input-group">
            <label>Nitrogen (N)</label>
            <input type="number" id="N" value="180" required>
        </div>
        <div class="input-group">
            <label>Phosphorus (P)</label>
            <input type="number" id="P" value="130" required>
        </div>
        <div class="input-group">
            <label>Potassium (K)</label>
            <input type="number" id="K" value="150" required>
        </div>
        <div class="input-group">
            <label>pH Tanah</label>
            <input type="number" id="ph" value="7.2" step="0.1" required>
        </div>
            <div class="input-group">
                <label for="temperature">Temperature (°C):</label>
                <input type="number" id="temperature" value="30.5" min="0" step="0.1" required>
            </div>
            <div class="input-group">
                <label for="humidity">Humidity (%):</label>
                <input type="number" id="humidity" value="85.0" min="0" max="100" step="0.1" required>
            </div>
            <div class="input-group">
                <label for="rainfall">Rainfall (mm):</label>
                <input type="number" id="rainfall" value="245.0" min="0" step="0.1" required>
            </div>

        <button type="submit">Jalankan Prediksi Fuzzy</button>
    </form>

    <!-- ================= HASIL MANUAL ================= -->
    <div class="result-area">
        <h2>Hasil Prediksi (Input Manual)</h2>
        <p id="crisp-value">Nilai Crisp: -</p>
        <p id="interpretation">Interpretasi: -</p>
        <p id="confidence">Derajat Fuzzy: -</p>
    </div>

    <hr>

    <!-- ================= DATASET REFERENSI ================= -->
    <hr>

    <div class="dataset-area">
        <h2 style="text-align:center">Dataset Referensi</h2>
        <p style="text-align:center">
            Dataset berikut ditampilkan sebagai <b>referensi</b>.
        </p>

        <table border="1" width="100%" style="border-collapse:collapse">
            <thead>
                <tr>
                    <th>No</th>
                    <th>N</th>
                    <th>P</th>
                    <th>K</th>
                    <th>Temperature (°C)</th>
                    <th>Humidity (%)</th>
                    <th>pH</th>
                    <th>Rainfall (mm)</th>
                </tr>
            </thead>
            <tbody id="datasetResult"></tbody>
        </table>
    </div>

<script src="fuzzy_logic.js"></script>
</body>
</html>
